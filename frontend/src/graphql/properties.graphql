query GetProperties($limit: Int, $offset: Int, $minPrice: Int, $maxPrice: Int, $postcodeOutward: String, $postcodeInward: String, $townCity: String, $county: String, $propertyType: String) {
  properties(limit: $limit, offset: $offset, minPrice: $minPrice, maxPrice: $maxPrice, postcodeOutward: $postcodeOutward, postcodeInward: $postcodeInward, townCity: $townCity, county: $county, propertyType: $propertyType) {
    items {
      id
      price
      dateOfTransfer
      postcodeOutward
      postcodeInward
      propertyType
      oldNew
      address
      townCity
      county
    }
    total
  }
}

mutation CreateProperty($input: PropertyInput!) {
  createProperty(input: $input) {
    id
    price
    address
  }
}

mutation UpdateProperty($id: ID!, $input: PropertyInput!) {
  updateProperty(id: $id, input: $input) {
    id
    price
    address
  }
}

mutation DeleteProperty($id: ID!) {
  deleteProperty(id: $id)
}

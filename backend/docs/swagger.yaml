        example: 'query { properties(limit: 5) { items { id price street } } }'
        type: string
      variables:
        additionalProperties: true
        description: Optional variables for the operation
        type: object
    type: object
  internal_routes_api.GraphQLResponse:
    properties:
      data:
        description: The requested data
      errors:
        description: Any errors encountered during execution
        items:
          $ref: '#/definitions/internal_routes_api.GraphQLError'
        type: array
    type: object
  internal_routes_api.JobResponse:
    properties:

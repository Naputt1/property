        type: string
      message:
        type: string
      status:
        example: true
        type: boolean
    type: object
  internal_routes_api.LoginBody:
    properties:
      password:
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  internal_routes_api.LoginPayload:
    properties:
      token:
        type: string
      user:
        $ref: '#/definitions/backend_internal_models.User'
    type: object
host: localhost:8080
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: This is a comprehensive API for analyzing and accessing UK housing
    market and rental data.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: UK Housing Market & Rental Intelligence API
  version: "1.0"
paths:
  /admin/stream-upload:
    post:
      consumes:
      - application/octet-stream
      description: Stream a large CSV file directly from the request body to bucket
        and queue a migration job
      parameters:
      - description: Original filename
        in: query
        name: filename
        required: true
        type: string
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            $ref: '#/definitions/internal_routes_api.JobResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_routes_api.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_routes_api.ErrorResponse'
      security:
      - JwtAuth: []
      summary: Stream upload CSV file
      tags:
      - admin
  /admin/upload:
    post:
      consumes:
      - multipart/form-data
      description: Upload a CSV file via multipart/form-data to bucket and queue a
        migration job
      parameters:
      - description: CSV File
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            $ref: '#/definitions/internal_routes_api.JobResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_routes_api.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_routes_api.ErrorResponse'
      security:
      - JwtAuth: []
      summary: Upload CSV file directly
      tags:
      - admin
  /analytics/affordability:
    get:
      consumes:
      - application/json
      description: Get relative affordability by property type
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/backend_internal_models.AffordabilityResult'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_routes_api.ErrorResponse'
      summary: Get affordability index
      tags:
      - analytics
  /analytics/growth-hotspots:
    get:
      consumes:
      - application/json
      description: Get top districts with highest price growth rate
      parameters:
      - default: 10
        description: Number of results
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/backend_internal_models.GrowthHotspotResult'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_routes_api.ErrorResponse'
      summary: Get growth hotspots
      tags:
      - analytics
  /analytics/median-price:
    get:
      consumes:
      - application/json
      description: Get median price grouped by county, district, or town_city
      parameters:
      - default: county
        description: Region type (county, district, town_city)
        in: query
        name: by
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/backend_internal_models.MedianPriceResult'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_routes_api.ErrorResponse'
      summary: Get median price by region
      tags:
      - analytics
  /analytics/new-build-premium:
    get:
      consumes:
      - application/json
      description: Get average prices of new builds vs established properties by region
      parameters:
      - default: county
        description: Region type (county, district, town_city)
        in: query
        name: by
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/backend_internal_models.NewBuildPremiumResult'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_routes_api.ErrorResponse'
      summary: Get new build premium
      tags:
      - analytics
  /analytics/price-bracket-distribution:
    get:
      consumes:
      - application/json
      description: Get distribution of properties by price ranges
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/backend_internal_models.PriceBracketResult'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_routes_api.ErrorResponse'
      summary: Get price bracket distribution
      tags:
      - analytics
  /analytics/price-trend:
    get:
      consumes:
      - application/json
      description: Get average and median price trends over time
      parameters:
      - default: month
        description: Time interval (month, year)
        in: query
        name: interval
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/backend_internal_models.PriceTrendResult'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_routes_api.ErrorResponse'
      summary: Get price trend analysis
      tags:
      - analytics
  /analytics/property-type-distribution:
    get:
      consumes:
      - application/json
      description: Get distribution of properties by type (detached, semi, flat, etc.)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/backend_internal_models.PropertyTypeDistributionResult'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_routes_api.ErrorResponse'
      summary: Get property type distribution
      tags:
      - analytics
  /analytics/top-active-areas:
    get:
      consumes:
      - application/json
      description: Get regions with highest transaction volume
      parameters:
      - default: district
        description: Region type (county, district, town_city)
        in: query
        name: by
        type: string
      - default: 10
        description: Number of results
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/backend_internal_models.TopActiveAreaResult'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_routes_api.ErrorResponse'
      summary: Get top active areas
      tags:
      - analytics
  /api/query:
    post:
      consumes:
      - application/json
      description: |-
        Execute complex queries and mutations for properties and background jobs.

        This endpoint provides a flexible way to fetch exactly the data you need.
        It supports filtering, pagination, and nested data structures.

        ### Authentication
        This endpoint uses Optional JWT Authentication.
        - Public users can query property listings.
        - Authenticated users can access additional details.
        - Admin users (identified by JWT) can perform mutations like creating, updating, or deleting properties.

        ### Example Property Query
        ```graphql
        query {
        properties(limit: 10, minPrice: 200000, townCity: "London") {
        items {
        id
        price
        street
        postcode
        }
        total
        }
        }
        ```

        ### Example Job Query (Admin only)
        ```graphql
        query {
        jobs(limit: 5) {
        items {
        id
        status
        progress
        taskType
        }
        total
        }
        }
        ```

        ### Example Mutations (Admin only)

        **Create Property:**
        ```graphql
        mutation {
        createProperty(input: {
        price: 250000,
        dateOfTransfer: "2024-03-07T00:00:00Z",
        postcode: "SW1A 1AA",
        propertyType: "D",
        oldNew: "N",
        duration: "F",
        paon: "10",
        saon: "",
        street: "Downing Street",
        locality: "Westminster",
        townCity: "London",
        district: "Greater London",
        county: "London",
        ppdCategoryType: "A",
        recordStatus: "A"
        }) { id price street }
        }
        ```

        **Update Property:**
        ```graphql
        mutation {
        updateProperty(id: "UUID-HERE", input: {
        price: 260000,
        # ... other fields
        }) { id price }
        }
        ```

        **Delete Property:**
        ```graphql
        mutation {
        deleteProperty(id: "UUID-HERE")
        }
        ```
      parameters:
      - description: GraphQL Operation (Query or Mutation)
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_routes_api.GraphQLRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_routes_api.GraphQLResponse'
        "400":
          description: Invalid GraphQL request
          schema:
            $ref: '#/definitions/internal_routes_api.ErrorResponse'
        "401":
          description: Unauthorized (if authentication is required for specific operation)
          schema:
            $ref: '#/definitions/internal_routes_api.ErrorResponse'
      summary: Unified GraphQL API
      tags:
      - GraphQL
  /auth/login:
    post:
      consumes:
      - application/json
      description: Log in a user with username and password
      parameters:
      - description: User login credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_routes_api.LoginBody'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_routes_api.LoginPayload'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_routes_api.ErrorResponse'
      summary: User login
      tags:
      - auth
  /auth/logout:
    post:
      consumes:
      - application/json
      description: Log out the current user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_routes_api.BaseResponse'
      summary: User logout
      tags:
      - auth
securityDefinitions:
  JwtAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"

      time:
        type: string
      valid:
        description: Valid is true if Time is not NULL
        type: boolean
    type: object
  internal_routes_api.BaseResponse:
    properties:
      message:
        type: string
      status:
        example: true
        type: boolean
    type: object
  internal_routes_api.ErrorResponse:
    properties:
      error:
        type: string
      status:
        example: false
        type: boolean
    type: object
  internal_routes_api.GraphQLError:
    properties:
      extensions:
        additionalProperties: true
        type: object
      locations:
        items:
          $ref: '#/definitions/internal_routes_api.GraphQLLocation'
        type: array
      message:
        type: string
      path:
        items: {}
        type: array
    type: object
  internal_routes_api.GraphQLLocation:
    properties:
      column:
        type: integer
      line:
        type: integer
    type: object
  internal_routes_api.GraphQLRequest:
    properties:

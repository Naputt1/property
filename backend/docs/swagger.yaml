        type: integer
      region:
        type: string
    type: object
  backend_internal_models.NewBuildPremiumResult:
    properties:
      new_avg:
        type: integer
      old_avg:
        type: integer
      premium_percent:
        type: number
      region:
        type: string
    type: object
  backend_internal_models.PriceBracketResult:
    properties:

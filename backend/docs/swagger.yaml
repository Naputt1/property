        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_routes_api.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/internal_routes_api.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_routes_api.ErrorResponse'
      security:
      - JwtAuth: []
      summary: Create a new user
      tags:
      - admin

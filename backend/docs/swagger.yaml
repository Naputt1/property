host: localhost:8080
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: This is a comprehensive API for analyzing and accessing UK housing
    market and rental data.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: UK Housing Market & Rental Intelligence API
  version: "1.0"
paths:
  /admin/migrate-existing:
    post:
      description: Queue a migration job for a file already in the bucket
      parameters:
      - description: Key in bucket
        in: query
        name: bucketKey
        required: true
        type: string
      - description: CSV has header
        in: query
        name: hasHeader
        type: boolean
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            $ref: '#/definitions/internal_routes_api.JobResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_routes_api.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_routes_api.ErrorResponse'
        "403":
          description: Forbidden (Admin only)
          schema:
            $ref: '#/definitions/internal_routes_api.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_routes_api.ErrorResponse'
      security:
      - JwtAuth: []
      summary: Trigger migration for existing bucket file
      tags:
      - admin
  /admin/reset:
    post:
      description: Truncate properties and jobs tables, clear queues, and clear analytics
        cache
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_routes_api.BaseResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_routes_api.ErrorResponse'
        "403":
          description: Forbidden (Admin only)
          schema:
            $ref: '#/definitions/internal_routes_api.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_routes_api.ErrorResponse'
      security:
      - JwtAuth: []
      summary: Reset backend state
      tags:
      - admin
  /admin/stream-upload:
    post:
      consumes:
      - application/octet-stream
      description: Stream a large CSV file directly from the request body to bucket
        and queue a migration job
      parameters:
      - description: Original filename
        in: query
        name: filename
        required: true
        type: string
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            $ref: '#/definitions/internal_routes_api.JobResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_routes_api.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_routes_api.ErrorResponse'
        "403":
          description: Forbidden (Admin only)
          schema:
            $ref: '#/definitions/internal_routes_api.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_routes_api.ErrorResponse'
      security:
      - JwtAuth: []
      summary: Stream upload CSV file
      tags:
      - admin
  /admin/upload:
    post:
      consumes:
      - multipart/form-data
      description: Upload a CSV file via multipart/form-data to bucket and queue a
        migration job
      parameters:
      - description: CSV File
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:

basePath: /api
definitions:
  api.BaseResponse:
    properties:
      message:
        type: string
      status:
        example: true
        type: boolean
    type: object
  api.ErrorResponse:
    properties:
      error:
        type: string
      status:
        example: false
        type: boolean
    type: object
  api.JobResponse:
    properties:
      job_id:
        type: string
      message:
        type: string
      status:
        example: true
        type: boolean
    type: object
  api.LoginBody:
    properties:
      password:
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  api.LoginResponse:
    properties:
      status:
        example: true
        type: boolean
      token:
        type: string
    type: object
  api.PropertyListResponse:
    properties:
      data:
        items: {}
        type: array
      message:
        type: string
      status:
        example: true
        type: boolean
    type: object
  api.PropertyResponse:
    properties:
      data: {}
      message:
        type: string
      status:
        example: true
        type: boolean
    type: object
  models.AffordabilityResult:
    properties:
      avg_price:
        type: integer
      property_type:
        type: string
      relative_affordability:
        type: number
    type: object
  models.CSVConfigPayload:
    properties:
      column_mapping:
        additionalProperties:
          type: string
        type: object
      file_path:
        type: string
      has_header:
        type: boolean
    required:
    - file_path
    type: object
  models.GrowthHotspotResult:
    properties:
      current_median:
        type: integer
      growth_rate:
        type: number
      prev_median:
        type: integer
      region:
        type: string
    type: object
  models.MedianPriceResult:
    properties:
      median_price:
        type: integer
      region:
        type: string
    type: object
  models.PriceTrendResult:
    properties:
      avg_price:
        type: integer
      median_price:
        type: integer
      period:
        type: string
      transaction_count:
        type: integer
    type: object
host: localhost:8080
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: This is a comprehensive API for analyzing and accessing UK housing
    market and rental data.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: UK Housing Market & Rental Intelligence API
  version: "1.0"
paths:
  /admin/upload:
    post:
      consumes:
      - application/json
      description: Queue a background job to migrate properties from a CSV file
      parameters:
      - description: CSV Migration Configuration
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.CSVConfigPayload'
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            $ref: '#/definitions/api.JobResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - JwtAuth: []
      summary: Upload CSV for migration
      tags:
      - admin
  /analytics/affordability:
    get:
      consumes:
      - application/json
      description: Get relative affordability by property type
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.AffordabilityResult'
            type: array
      security:
      - JwtAuth: []
      summary: Get affordability index
      tags:
      - analytics
  /analytics/growth-hotspots:
    get:
      consumes:
      - application/json
      description: Get top districts with highest price growth rate
      parameters:
      - default: 10
        description: Number of results
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.GrowthHotspotResult'
            type: array
      security:
      - JwtAuth: []
      summary: Get growth hotspots
      tags:
      - analytics
  /analytics/median-price:
    get:
      consumes:
      - application/json
      description: Get median price grouped by county, district, or town_city
      parameters:
      - default: county
        description: Region type (county, district, town_city)
        in: query
        name: by
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.MedianPriceResult'
            type: array
      security:
      - JwtAuth: []
      summary: Get median price by region
      tags:
      - analytics
  /analytics/price-trend:
    get:
      consumes:
      - application/json
      description: Get average and median price trends over time
      parameters:
      - default: month
        description: Time interval (month, year)
        in: query
        name: interval
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.PriceTrendResult'
            type: array
      security:
      - JwtAuth: []
      summary: Get price trend analysis
      tags:
      - analytics
  /auth/login:
    post:
      consumes:
      - application/json
      description: Log in a user with username and password
      parameters:
      - description: User login credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.LoginBody'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.LoginResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: User login
      tags:
      - auth
  /auth/logout:
    post:
      consumes:
      - application/json
      description: Log out the current user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.BaseResponse'
      summary: User logout
      tags:
      - auth
  /property:
    get:
      consumes:
      - application/json
      description: Get a list of UK housing properties with pagination and filtering
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.PropertyListResponse'
      security:
      - JwtAuth: []
      summary: List properties
      tags:
      - property
  /property/{id}:
    get:
      consumes:
      - application/json
      description: Get detailed information for a specific property
      parameters:
      - description: Property ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.PropertyResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - JwtAuth: []
      summary: Get property by ID
      tags:
      - property
securityDefinitions:
  JwtAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"

        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_routes_api.ErrorResponse'
      security:
      - JwtAuth: []
      summary: Upload CSV file directly
      tags:
      - admin
  /admin/users:
    get:
      description: Get a list of all users. Admin only.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
